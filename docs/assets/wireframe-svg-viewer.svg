<svg viewBox="0 0 440 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="440" height="720" rx="16" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1.5"/>

  <!-- Header -->
  <rect width="440" height="56" rx="16" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect y="40" width="440" height="16" fill="#FFFFFF"/>
  <text x="16" y="36" font-size="16" fill="#888">← Volver</text>
  <text x="140" y="36" font-size="15" font-weight="bold" fill="#333">Navidad 2025</text>
  <circle cx="416" cy="28" r="14" fill="#E8E8E8"/>
  <text x="410" y="33" font-size="13" fill="#999">◉</text>

  <!-- Image area -->
  <rect x="16" y="68" width="408" height="260" rx="12" fill="#D9E4F5" stroke="#B0C4DE" stroke-width="1"/>
  <rect x="150" y="148" width="140" height="100" rx="70" fill="#C2D6F0" stroke="#8FAED0" stroke-width="1" stroke-dasharray="4"/>
  <text x="183" y="200" font-size="13" fill="#6D8CB5">Imagen del</text>
  <text x="185" y="218" font-size="13" fill="#6D8CB5">recuerdo</text>

  <!-- Filter badge on image -->
  <rect x="320" y="296" width="92" height="24" rx="12" fill="#4A90D9" opacity="0.9"/>
  <text x="333" y="313" font-size="11" fill="#FFFFFF" font-weight="bold">🔵 Filtro: 75%</text>

  <!-- Metadata -->
  <text x="20" y="354" font-size="16" fill="#333" font-weight="bold">24 de diciembre, 2025</text>
  <text x="20" y="376" font-size="14" fill="#666">📍 Casa familiar</text>
  <text x="20" y="396" font-size="14" fill="#666">👥 Lucía, Tomás, Pablo, Elena</text>

  <!-- Separator -->
  <line x1="20" y1="414" x2="420" y2="414" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Filter section title -->
  <text x="20" y="440" font-size="15" font-weight="bold" fill="#333">Claridad Facial</text>

  <!-- Slider track -->
  <text x="20" y="472" font-size="13" fill="#999">Poco clara</text>
  <text x="352" y="472" font-size="13" fill="#999">Muy clara</text>

  <!-- Slider background -->
  <rect x="20" y="482" width="400" height="8" rx="4" fill="#E0E0E0"/>
  <!-- Slider filled -->
  <rect x="20" y="482" width="300" height="8" rx="4" fill="#4A90D9"/>
  <!-- Slider thumb -->
  <circle cx="320" cy="486" r="14" fill="#4A90D9" stroke="#FFFFFF" stroke-width="3"/>
  <text x="313" y="491" font-size="10" fill="#FFFFFF" font-weight="bold">75</text>

  <!-- Percentage label -->
  <text x="196" y="520" font-size="20" font-weight="bold" fill="#4A90D9">75%</text>

  <!-- Safety message -->
  <rect x="20" y="534" width="400" height="32" rx="8" fill="#F0F7FF"/>
  <text x="36" y="555" font-size="12" fill="#5A8BC2">ℹ️  El recuerdo original siempre se conserva</text>

  <!-- Buttons -->
  <rect x="20" y="582" width="194" height="56" rx="12" fill="#4CAF81" stroke="none"/>
  <text x="60" y="616" font-size="15" fill="#FFFFFF" font-weight="bold">💾 Guardar</text>
  <text x="72" y="633" font-size="12" fill="rgba(255,255,255,0.8)">ajuste</text>

  <rect x="226" y="582" width="194" height="56" rx="12" fill="#E8E8E8" stroke="none"/>
  <text x="266" y="616" font-size="15" fill="#666" font-weight="bold">↩ Deshacer</text>

  <!-- Bottom nav -->
  <rect y="660" width="440" height="60" rx="0" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect y="660" width="440" height="1" fill="#E0E0E0"/>
  <text x="56" y="696" font-size="13" fill="#999" text-anchor="middle">🏠 Inicio</text>
  <text x="220" y="696" font-size="13" fill="#4A90D9" text-anchor="middle" font-weight="bold">📷 Galería</text>
  <text x="384" y="696" font-size="13" fill="#999" text-anchor="middle">⚙ Ajustes</text>

  <!-- Annotation arrows (design rationale) -->
  <!-- These would be margin annotations in a real wireframe doc -->
</svg>